<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MarketChat | Public Marketplace</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .login-screen {
      background: #1e293b;
      border-radius: 24px;
      padding: 40px 28px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .login-screen.hidden { display: none; }
    .login-icon { font-size: 3.5rem; margin-bottom: 16px; }
    .login-screen h2 { color: #f1f5f9; font-size: 1.8rem; margin-bottom: 6px; font-weight: 700; }
    .login-screen p { color: #94a3b8; margin-bottom: 28px; font-size: 0.9rem; }
    .login-screen input {
      width: 100%;
      padding: 16px 20px;
      border-radius: 16px;
      border: 2px solid #334155;
      background: #0f172a;
      color: #f1f5f9;
      font-size: 1rem;
      outline: none;
      transition: 0.2s;
      margin-bottom: 20px;
    }
    .login-screen input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }
    .login-btn {
      width: 100%;
      padding: 16px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
    }
    .login-btn:hover { background: #2563eb; transform: translateY(-1px); }
    .error-msg { color: #f87171; font-size: 0.85rem; margin-top: 8px; min-height: 20px; }

    .chat-screen {
      width: 100%;
      max-width: 520px;
      height: 92vh;
      max-height: 850px;
      background: #1e293b;
      border-radius: 28px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .chat-screen.hidden { display: none; }

    .chat-header {
      background: rgba(30, 41, 59, 0.95);
      backdrop-filter: blur(20px);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      color: #f0f0f0;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .market-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
    }
    .header-info h3 { font-size: 1.1rem; font-weight: 700; }
    .online-count { font-size: 0.8rem; color: #22c55e; display: flex; align-items: center; gap: 5px; }
    .online-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .user-badge {
      background: rgba(59, 130, 246, 0.2);
      color: #93c5fd;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .logout-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #cbd5e1;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .logout-btn:hover { background: rgba(239, 68, 68, 0.2); color: #f87171; }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: #0f172a;
    }
    .message {
      display: flex;
      flex-direction: column;
      max-width: 82%;
      animation: slideIn 0.25s ease-out;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.mine { align-self: flex-end; align-items: flex-end; }
    .message.others { align-self: flex-start; align-items: flex-start; }
    .message-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      font-size: 0.78rem;
      font-weight: 600;
      color: #94a3b8;
    }
    .message.mine .message-header { flex-direction: row-reverse; }
    .username-tag {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      padding: 2px 10px;
      border-radius: 10px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .message.mine .username-tag {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
    }
    .message-time { font-size: 0.7rem; color: #64748b; font-weight: 400; }
    .message-bubble {
      padding: 12px 16px;
      border-radius: 20px;
      font-size: 0.95rem;
      line-height: 1.45;
      word-wrap: break-word;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .message.others .message-bubble {
      background: #1e293b;
      color: #e2e8f0;
      border-bottom-left-radius: 6px;
    }
    .message.mine .message-bubble {
      background: #2563eb;
      color: white;
      border-bottom-right-radius: 6px;
    }
    .system-message {
      text-align: center;
      color: #64748b;
      font-size: 0.8rem;
      font-style: italic;
      padding: 4px;
    }

    .input-area {
      background: #1e293b;
      padding: 12px 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }
    .text-row { display: flex; gap: 8px; align-items: center; }
    #messageInput {
      flex: 1;
      padding: 14px 18px;
      border-radius: 28px;
      border: 2px solid #334155;
      background: #0f172a;
      color: #f1f5f9;
      font-size: 0.95rem;
      outline: none;
      transition: 0.2s;
    }
    #messageInput:focus { border-color: #3b82f6; }
    .send-btn {
      background: #3b82f6;
      border: none;
      color: white;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.5);
    }
    .send-btn:hover { background: #2563eb; }

    @media (max-width: 400px) {
      .send-btn { width: 40px; height: 40px; }
    }
  </style>
</head>
<body>
  <div class="login-screen" id="loginScreen">
    <div class="login-icon">🏪</div>
    <h2>MarketChat</h2>
    <p>Join the marketplace conversation</p>
    <input type="text" id="usernameInput" placeholder="Enter your username..." maxlength="20" autocomplete="off">
    <button class="login-btn" id="loginBtn">Join Chat 💬</button>
    <div class="error-msg" id="loginError"></div>
  </div>

  <div class="chat-screen hidden" id="chatScreen">
    <div class="chat-header">
      <div class="header-left">
        <div class="market-icon">🏪</div>
        <div class="header-info">
          <h3>MarketChat</h3>
          <span class="online-count">
            <span class="online-dot"></span>
            <span id="onlineCount">0</span> online
          </span>
        </div>
      </div>
      <div style="display:flex; align-items:center; gap:10px;">
        <span class="user-badge" id="currentUserBadge">👤 You</span>
        <button class="logout-btn" id="logoutBtn">Leave</button>
      </div>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="input-area">
      <div class="text-row">
        <input type="text" id="messageInput" placeholder="Type your message..." autocomplete="off">
        <button class="send-btn" id="sendBtn">➤</button>
      </div>
    </div>
  </div>

  <script>
    const socket = io();
    let username = '';
    
    const loginScreen = document.getElementById('loginScreen');
    const chatScreen = document.getElementById('chatScreen');
    const usernameInput = document.getElementById('usernameInput');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');
    const currentUserBadge = document.getElementById('currentUserBadge');
    const onlineCountEl = document.getElementById('onlineCount');
    const chatMessages = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const logoutBtn = document.getElementById('logoutBtn');

    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function scrollToBottom() {
      setTimeout(() => {
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }, 50);
    }

    function addSystemMessage(text) {
      const div = document.createElement('div');
      div.className = 'system-message';
      div.textContent = text;
      chatMessages.appendChild(div);
      scrollToBottom();
    }

    function addMessage(msgData) {
      const { sender, type, content, timestamp } = msgData;
      const isMine = sender === username;
      const div = document.createElement('div');
      div.className = `message ${isMine ? 'mine' : 'others'}`;
      
      const time = new Date(timestamp);
      const timeStr = time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      
      div.innerHTML = `
        <div class="message-header">
          <span class="username-tag">${escapeHtml(sender)}</span>
          <span class="message-time">${timeStr}</span>
        </div>
        <div class="message-bubble">${escapeHtml(content)}</div>
      `;
      
      chatMessages.appendChild(div);
      scrollToBottom();
    }

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;

      socket.emit('chat_message', {
        type: 'text',
        content: text
      });
      
      messageInput.value = '';
    }

    // Socket.IO event listeners
    socket.on('connect', () => {
      console.log('Connected to server');
    });

    socket.on('chat_message', (msgData) => {
      addMessage(msgData);
    });

    socket.on('user_joined', (data) => {
      addSystemMessage(`🟢 ${escapeHtml(data.username)} joined the market`);
      onlineCountEl.textContent = data.onlineCount;
    });

    socket.on('user_left', (data) => {
      addSystemMessage(`🔴 ${escapeHtml(data.username)} left the market`);
      onlineCountEl.textContent = data.onlineCount;
    });

    socket.on('online_users', (users) => {
      onlineCountEl.textContent = users.length;
    });

    socket.on('message_history', (messages) => {
      messages.forEach(msg => addMessage(msg));
      addSystemMessage('📜 Loaded recent messages');
    });

    socket.on('join_error', (error) => {
      loginError.textContent = error;
      loginBtn.disabled = false;
    });

    function login() {
      const name = usernameInput.value.trim();
      if (!name || name.length < 2) {
        loginError.textContent = 'Username must be at least 2 characters';
        return;
      }

      username = name;
      loginBtn.disabled = true;
      
      socket.emit('join', { username });
      
      loginScreen.classList.add('hidden');
      chatScreen.classList.remove('hidden');
      currentUserBadge.textContent = `👤 ${username}`;
      
      addSystemMessage(`👋 Welcome, ${escapeHtml(username)}!`);
      messageInput.focus();
    }

    function logout() {
      socket.disconnect();
      chatMessages.innerHTML = '';
      username = '';
      chatScreen.classList.add('hidden');
      loginScreen.classList.remove('hidden');
      usernameInput.value = '';
      loginError.textContent = '';
      loginBtn.disabled = false;
      window.location.reload();
    }

    // Event listeners
    loginBtn.addEventListener('click', login);
    usernameInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });

    logoutBtn.addEventListener('click', logout);
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        sendMessage();
      }
    });

    usernameInput.focus();
  </script>
</body>
</html>
