<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Беседа Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- JOIN SCREEN -->
    <div id="join-screen">
        <h1>💬 Беседа</h1>
        <p>Pick a nickname</p>
        <input id="name-input" type="text" placeholder="Your nickname..." maxlength="20" />
        <button id="join-btn">Enter</button>
    </div>

    <!-- CHAT SCREEN -->
    <div id="chat-screen" style="display:none">
        <div id="messages"></div>
        <div id="input-area">
            <input id="msg-input" type="text" placeholder="Write a message..." />
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
